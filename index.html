<!DOCTYPE html>
<html lang="ru" data-theme="office">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elven Scroll — редактор шифрованных свитков</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&family=Cinzel:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Ember canvas: drifting motes shown briefly on theme transition -->
<canvas id="ember-field" aria-hidden="true"></canvas>

<!-- Seal wipe: the signature transition when crossing between worlds -->
<div id="seal-wipe" aria-hidden="true"></div>

<div class="app-container">

    <header class="toolbar">
        <div class="toolbar-brand">
            <span class="brand-mark" aria-hidden="true">
                <svg viewBox="0 0 32 32" width="22" height="22">
                    <path class="brand-mark-glyph" d="M16 2 L28 16 L16 30 L4 16 Z M16 8 L22 16 L16 24 L10 16 Z" fill="none" stroke="currentColor" stroke-width="1.6"/>
                </svg>
            </span>
            <div class="brand-text">
                <span class="brand-title">Elven&nbsp;Scroll</span>
                <span class="brand-subtitle" data-office="Текстовый редактор" data-elven="Мастерская переписчика">Текстовый редактор</span>
            </div>
        </div>

        <div class="toolbar-group formatting-tools" role="group" aria-label="Форматирование">
            <button class="tool-btn" onclick="format('bold')" title="Полужирный" aria-label="Полужирный">
                <svg viewBox="0 0 20 20" width="16" height="16"><path fill="currentColor" d="M5 3h6a4 4 0 013 6.7A4.2 4.2 0 0113 17H5V3zm3 2.7v3.6h3a1.8 1.8 0 000-3.6H8zm0 6v3.9h3.4a1.95 1.95 0 000-3.9H8z"/></svg>
            </button>
            <button class="tool-btn" onclick="format('italic')" title="Курсив" aria-label="Курсив">
                <svg viewBox="0 0 20 20" width="16" height="16"><path fill="currentColor" d="M8.5 3h6.5v2h-2.3l-3 10H12v2H5.5v-2h2.3l3-10H8.5z"/></svg>
            </button>
            <button class="tool-btn" onclick="format('underline')" title="Подчёркнутый" aria-label="Подчёркнутый">
                <svg viewBox="0 0 20 20" width="16" height="16"><path fill="currentColor" d="M5 3v7a5 5 0 0010 0V3h-2v7a3 3 0 01-6 0V3H5zm-1 13h12v1.6H4V16z"/></svg>
            </button>
            <button class="tool-btn" onclick="format('insertUnorderedList')" title="Список" aria-label="Список">
                <svg viewBox="0 0 20 20" width="16" height="16"><circle cx="3.2" cy="5" r="1.3" fill="currentColor"/><circle cx="3.2" cy="10" r="1.3" fill="currentColor"/><circle cx="3.2" cy="15" r="1.3" fill="currentColor"/><path stroke="currentColor" stroke-width="1.6" d="M7 5h10M7 10h10M7 15h10"/></svg>
            </button>
        </div>

        <div class="toolbar-group file-tools" role="group" aria-label="Файл">
            <button id="btn-save" class="tool-btn tool-btn--labeled" title="Зашифровать и сохранить">
                <svg viewBox="0 0 20 20" width="16" height="16"><path fill="currentColor" d="M4 3h9l3 3v11a1 1 0 01-1 1H4a1 1 0 01-1-1V4a1 1 0 011-1zm8 1.4V7h-2.6V4.4H12zM6 12h8v1.4H6V12zm0 2.6h8V16H6v-1.4z"/></svg>
                <span data-office="Сохранить" data-elven="Запечатать">Сохранить</span>
            </button>
            <button id="btn-load-trigger" class="tool-btn tool-btn--labeled" title="Открыть и расшифровать">
                <svg viewBox="0 0 20 20" width="16" height="16"><path fill="currentColor" d="M2.5 5.5A1.5 1.5 0 014 4h4l1.6 1.8H16a1.5 1.5 0 011.5 1.5v7A1.5 1.5 0 0116 16H4a1.5 1.5 0 01-1.5-1.5v-9z"/></svg>
                <span data-office="Открыть" data-elven="Развернуть">Открыть</span>
            </button>
            <button id="btn-pdf" class="tool-btn tool-btn--labeled" title="Экспортировать в PDF">
                <svg viewBox="0 0 20 20" width="16" height="16"><path fill="currentColor" d="M5 2h6l4 4v11a1 1 0 01-1 1H5a1 1 0 01-1-1V3a1 1 0 011-1zm6 1.4V6h2.6L11 3.4zM6.5 10.5h2a1.6 1.6 0 010 3.2h-.7V15H6.5v-4.5zm1.3 1.1v1h.6a.55.55 0 000-1h-.6zM10.5 10.5H12a2.2 2.2 0 012.2 2.25 2.2 2.2 0 01-2.2 2.25h-1.5v-4.5zm1.1 1.02v2.46H12a1.13 1.13 0 001.1-1.23A1.13 1.13 0 0012 11.52h-.4zM14.6 10.5h2.4v1.02h-1.3v.83h1.2v1h-1.2V15h-1.1v-4.5z"/></svg>
                <span data-office="В PDF" data-elven="Свиток">В PDF</span>
            </button>
            <input type="file" id="file-input" accept=".elven" style="display: none;">
        </div>

        <button id="toggle-theme" class="seal-btn" title="Пересечь границу миров" aria-label="Сменить тему">
            <svg viewBox="0 0 44 44" width="34" height="34">
                <circle cx="22" cy="22" r="19" class="seal-ring"/>
                <path class="seal-glyph" d="M22 10 L32 22 L22 34 L12 22 Z M22 16 L26 22 L22 28 L18 22 Z" fill="none" stroke="currentColor" stroke-width="1.4"/>
            </svg>
        </button>
    </header>

    <main class="editor-container">
        <div class="editor-sheet">
            <div id="editor" contenteditable="true" data-placeholder-office="Начните печатать здесь…" data-placeholder-elven="Начните выводить тэнгвар…"></div>
        </div>
        <div class="status-bar">
            <span id="word-count">0 слов</span>
            <span class="status-dot" aria-hidden="true">·</span>
            <span id="theme-status" data-office="документ не зашифрован" data-elven="свиток запечатан рунами">документ не зашифрован</span>
        </div>
    </main>
</div>

<!-- Password modal, replaces window.prompt -->
<div id="modal-overlay" class="modal-overlay" hidden>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <h2 id="modal-title">Введите ключ</h2>
        <p id="modal-subtitle" class="modal-subtitle">Этот ключ понадобится, чтобы развернуть свиток снова.</p>
        <input id="modal-input" type="password" autocomplete="off" placeholder="••••••••">
        <div class="modal-actions">
            <button id="modal-cancel" class="modal-btn modal-btn--ghost">Отмена</button>
            <button id="modal-confirm" class="modal-btn modal-btn--primary">Подтвердить</button>
        </div>
    </div>
</div>

<!-- Toast notifications, replaces window.alert -->
<div id="toast-stack" class="toast-stack" aria-live="polite"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="app.js"></script>
</body>
</html>
